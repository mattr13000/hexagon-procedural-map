<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hex Map Generator</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      background: #1a1a2e;
      font-family: 'Courier New', monospace;
      display: flex;
      height: 100vh;
    }

    /* ── canvas area ── */
    #viewport {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #viewport canvas { display: block; width: 100% !important; height: 100% !important; }

    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      color: #aed9e0;
      font-size: 1.1rem;
      z-index: 10;
    }

    /* ── left overlay panel ── */
    #controls {
      position: absolute;
      top: 16px;
      left: 16px;
      background: rgba(8, 8, 18, 0.82);
      backdrop-filter: blur(8px);
      color: #cdd;
      padding: 14px 18px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.07);
      font-size: 12px;
      display: none;
      flex-direction: column;
      gap: 9px;
      min-width: 230px;
      max-height: calc(100vh - 32px);
      overflow-y: auto;
    }
    #controls h3 {
      color: #aed9e0;
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .sep { border: none; border-top: 1px solid rgba(255,255,255,0.07); }
    .row { display: flex; align-items: center; gap: 8px; }
    .row label { width: 72px; flex-shrink: 0; color: #8899aa; }
    input[type="range"] { flex: 1; accent-color: #4a90e2; cursor: pointer; }
    input[type="number"] {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 4px;
      color: #cdd;
      padding: 4px 7px;
      font-family: inherit;
      font-size: 12px;
    }
    .val { min-width: 38px; text-align: right; color: #aed9e0; }
    button {
      background: #1d4ed8;
      color: #fff;
      border: none;
      padding: 7px 0;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      letter-spacing: 0.04em;
      transition: background 0.15s;
    }
    button:hover  { background: #2563eb; }
    button:active { background: #1e40af; }

    /* ── detail panel (below controls) ── */
    #detail {
      display: none;
      flex-direction: column;
      gap: 7px;
      border-top: 1px solid rgba(255,255,255,0.07);
      padding-top: 10px;
      margin-top: 2px;
    }
    #detail h4 { color: #aed9e0; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; }
    .detail-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .detail-row--spread { justify-content: space-between; }
    .detail-label { color: #8899aa; font-size: 11px; }
    .detail-badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 10px;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
    }
    .detail-empty { color: #556; font-size: 11px; font-style: italic; }
    .detail-stepper { display: flex; align-items: center; gap: 5px; }
    .detail-stepper button {
      padding: 3px 8px;
      font-size: 11px;
      background: #374151;
      min-width: unset;
    }
    .detail-stepper button:hover { background: #4b5563; }
    .detail-stepper span { min-width: 32px; text-align: center; color: #aed9e0; font-size: 11px; }
    .detail-btn {
      font-size: 11px;
      padding: 5px 0;
      background: #374151;
    }
    .detail-btn:hover { background: #4b5563; }
    .detail-btn.danger { background: #7f1d1d; }
    .detail-btn.danger:hover { background: #991b1b; }

    /* ── right asset panel ── */
    #asset-panel {
      width: 500px;
      flex-shrink: 0;
      background: rgba(8, 8, 18, 0.95);
      border-left: 1px solid rgba(255,255,255,0.07);
      display: none;
      flex-direction: column;
      overflow-y: auto;
      overflow-x: auto;
      padding: 10px 8px;
      gap: 6px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: #cdd;
    }

    #eraseBtn {
      width: 100%;
      background: #7f1d1d;
      margin-bottom: 4px;
      padding: 8px 0;
      font-size: 12px;
    }
    #eraseBtn:hover  { background: #991b1b; }
    #eraseBtn.active { background: #dc2626; box-shadow: 0 0 0 2px #f87171; }

    .cat-section { display: flex; flex-direction: column; gap: 4px; }
    .cat-header {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      padding: 3px 4px;
      border-radius: 4px;
      user-select: none;
    }
    .cat-header:hover { background: rgba(255,255,255,0.05); }
    .cat-badge {
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 10px;
      color: #fff;
      font-weight: bold;
      letter-spacing: 0.04em;
    }
    .cat-arrow { margin-left: auto; color: #556; font-size: 10px; }

    .cat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px;
      padding: 0 2px 4px;
    }
    .asset-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 5px 3px;
      border-radius: 5px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background 0.1s;
    }
    .asset-item:hover    { background: rgba(255,255,255,0.06); }
    .asset-item.selected { background: rgba(74,144,226,0.18); border-color: #4a90e2; }
    .asset-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .asset-label {
      font-size: 9px;
      color: #99aabb;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      width: 100%;
    }
    .asset-item.selected .asset-label { color: #aed9e0; }
  </style>
  <script type="module" crossorigin src="./assets/index-NuGIBYCQ.js"></script>
</head>
<body>
  <div id="viewport">
    <div id="loading">Loading assets…</div>
    <div id="controls">
      <h3>Hex Map Generator</h3>
      <div class="row">
        <label>Grid</label>
        <input type="range" id="gridSize" min="10" max="50" value="20" step="1" />
        <span class="val" id="gridDisplay">20×20</span>
      </div>
      <div class="row">
        <label>Seed</label>
        <input type="number" id="seed" value="42" min="0" max="999999" />
      </div>
      <div class="row">
        <label>Water</label>
        <input type="range" id="waterLevel" min="-0.8" max="0.6" value="-0.1" step="0.05" />
        <span class="val" id="waterDisplay">-0.10</span>
      </div>
      <hr class="sep" />
      <div class="row">
        <label>Water props</label>
        <input type="range" id="waterDensity" min="0" max="1" value="0.15" step="0.01" />
        <span class="val" id="waterDensityDisplay">15%</span>
      </div>
      <div class="row">
        <label>Land props</label>
        <input type="range" id="landDensity" min="0" max="1" value="0.20" step="0.01" />
        <span class="val" id="landDensityDisplay">20%</span>
      </div>
      <div class="row">
        <label>Clouds</label>
        <input type="range" id="cloudDensity" min="0" max="1" value="0.05" step="0.01" />
        <span class="val" id="cloudDensityDisplay">5%</span>
      </div>
      <div class="row">
        <label>Cloud alt.</label>
        <input type="range" id="cloudElevation" min="0" max="15" value="3" step="0.5" />
        <span class="val" id="cloudElevationDisplay">3</span>
      </div>
      <button id="generate">Generate</button>
      <button id="blank">Blank Map</button>
      <hr class="sep" />
      <button id="export">Export .glb</button>
      <button id="import">Import .glb</button>

      <!-- Detail panel — shown when a hex is selected -->
      <div id="detail">
        <h4>Selected tile</h4>
      </div>
    </div>
  </div>

  <!-- Right asset panel -->
  <div id="asset-panel"></div>

</body>
</html>
